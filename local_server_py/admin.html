<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarmenKarla Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --card: #1a1a24; --card2: #22222f;
    --accent: #c9a96e; --accent2: #e8c98a;
    --text: #f0ece4; --sub: #888; --border: #2e2e3e;
    --red: #e05a5a; --green: #5acd8a; --blue: #5a9ee0;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; }
  .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 1.2rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .server-status { display: flex; align-items: center; gap: 8px; font-size: .85rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--sub); display: inline-block; }
  .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
  .section-title { font-size: 1rem; font-weight: 600; color: var(--accent); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .btn { cursor: pointer; border: none; border-radius: 8px; padding: 9px 20px; font-size: .88rem; font-weight: 600; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #f07070; }
  .btn-ghost { background: transparent; color: var(--sub); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .btn-sm { padding: 5px 12px; font-size: .78rem; }
  .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px 8px; border-radius: 6px; transition: background .15s; }
  .btn-icon:hover { background: var(--card2); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-full { grid-column: 1 / -1; }
  label { font-size: .78rem; color: var(--sub); display: block; margin-bottom: 5px; }
  input, textarea, select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 9px 12px; font-size: .88rem; outline: none;
    transition: border .15s; font-family: inherit;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 72px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .table-wrap { overflow-x: auto; border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { background: var(--card2); padding: 10px 12px; text-align: right; color: var(--sub); font-weight: 600; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .badge { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: .72rem; font-weight: 600; }
  .badge-green { background: rgba(90,205,138,.15); color: var(--green); }
  .badge-red { background: rgba(224,90,90,.15); color: var(--red); }
  .img-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); }
  .img-placeholder { width: 44px; height: 44px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .drop-zone {
    border: 2px dashed var(--border); border-radius: 10px; padding: 24px; text-align: center;
    cursor: pointer; transition: all .15s; background: var(--bg);
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: rgba(201,169,110,.06); }
  .drop-zone p { color: var(--sub); font-size: .85rem; margin-top: 8px; }
  .upload-preview { max-width: 120px; max-height: 120px; border-radius: 8px; margin-top: 10px; display: none; }
  .toast-container { position: fixed; bottom: 24px; left: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 18px; border-radius: 10px; font-size: .85rem; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,.4); animation: slideIn .2s ease; max-width: 320px; }
  .toast.success { background: rgba(90,205,138,.2); border: 1px solid var(--green); color: var(--green); }
  .toast.error { background: rgba(224,90,90,.2); border: 1px solid var(--red); color: var(--red); }
  .toast.info { background: rgba(90,158,224,.2); border: 1px solid var(--blue); color: var(--blue); }
  @keyframes slideIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; padding: 24px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 1.05rem; font-weight: 700; color: var(--accent); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .search-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 12px; font-size: .85rem; outline: none; width: 200px; }
  .search-box:focus { border-color: var(--accent); }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
  .stat-label { font-size: .78rem; color: var(--sub); margin-top: 4px; }
  .empty { text-align: center; padding: 48px; color: var(--sub); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 20px; transition: .2s; }
  .toggle-slider:before { position: absolute; content: ''; width: 14px; height: 14px; right: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  input:checked + .toggle-slider { background: var(--accent); }
  input:checked + .toggle-slider:before { transform: translateX(-16px); }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">🛍 CarmenKarla Admin</div>
  <div class="server-status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">جاري الاتصال...</span>
    <button class="btn btn-ghost btn-sm" onclick="checkHealth()">فحص</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ منتج جديد</button>
  </div>
</div>
<div class="container">
  <div class="card" id="settingsCard" style="display:none">
    <div class="section-title">⚙️ إعدادات الاتصال</div>
    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
      <div style="flex:1;min-width:220px">
        <label>رابط السيرفر (Base URL)</label>
        <input id="cfgBase" type="text" placeholder="http://10.29.102.158:8080">
      </div>
      <div style="flex:1;min-width:220px">
        <label>API Token</label>
        <input id="cfgToken" type="password" placeholder="ck_...">
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">حفظ وتحقق</button>
    </div>
  </div>
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-num" id="statTotal">–</div><div class="stat-label">إجمالي المنتجات</div></div>
    <div class="stat-card"><div class="stat-num" id="statVisible">–</div><div class="stat-label">ظاهرة</div></div>
    <div class="stat-card"><div class="stat-num" id="statHidden">–</div><div class="stat-label">مخفية</div></div>
    <div class="stat-card"><div class="stat-num" id="statCats">–</div><div class="stat-label">التصنيفات</div></div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div class="section-title" style="margin:0">📦 المنتجات</div>
      <div class="header-actions">
        <input class="search-box" id="searchBox" type="text" placeholder="بحث..." oninput="renderTable()">
        <button class="btn btn-ghost btn-sm" onclick="loadProducts()">🔄 تحديث</button>
        <label class="btn btn-ghost btn-sm" style="cursor:pointer">
          <input type="checkbox" id="showHidden" onchange="renderTable()" style="width:auto;margin-left:6px"> إظهار المخفية
        </label>
      </div>
    </div>
    <div class="table-wrap">
      <table id="productsTable">
        <thead>
          <tr>
            <th>صورة</th>
            <th>الاسم</th>
            <th>السعر</th>
            <th>التصنيف</th>
            <th>التقييم</th>
            <th>الحالة</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" class="empty"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">منتج جديد</div>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <input type="hidden" id="editId">
    <div class="form-grid">
      <div class="form-full"><label>اسم المنتج *</label><input id="fName" type="text" placeholder="اسم المنتج"></div>
      <div><label>السعر *</label><input id="fPrice" type="number" placeholder="0.00"></div>
      <div><label>السعر القديم</label><input id="fOldPrice" type="number" placeholder="0.00"></div>
      <div><label>التصنيف</label><input id="fCategory" type="text" placeholder="مثال: فساتين"></div>
      <div><label>الوسوم (tags)</label><input id="fTags" type="text" placeholder="tag1,tag2"></div>
      <div><label>المقاسات</label><input id="fSizes" type="text" placeholder="S,M,L,XL"></div>
      <div><label>الأطوال</label><input id="fLengths" type="text" placeholder="قصير,طويل"></div>
      <div><label>التقييم (0–5)</label><input id="fRating" type="number" min="0" max="5" step="0.1" placeholder="0.0"></div>
      <div><label>عدد المراجعات</label><input id="fReviews" type="number" placeholder="0"></div>
      <div class="form-full"><label>الوصف</label><textarea id="fDesc" placeholder="وصف المنتج..."></textarea></div>
      <div class="form-full">
        <label>الصورة</label>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
          <div style="font-size:2rem">📷</div>
          <p>اضغط لاختيار صورة أو اسحب وأفلت هنا</p>
          <img id="uploadPreview" class="upload-preview">
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
          <input id="fImageUrl" type="text" placeholder="رابط الصورة (اختياري)">
          <button class="btn btn-ghost btn-sm" onclick="uploadImage()" id="uploadBtn" style="white-space:nowrap">رفع ↑</button>
        </div>
      </div>
      <div class="form-full" style="display:flex;align-items:center;gap:12px">
        <label for="fHidden" style="margin:0">مخفي من المتجر</label>
        <label class="toggle"><input type="checkbox" id="fHidden"><span class="toggle-slider"></span></label>
      </div>
    </div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="saveProduct()" id="saveBtn">حفظ المنتج</button></div>
  </div>
</div>
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:400px;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:12px">🗑</div>
    <div style="font-size:1rem;font-weight:700;margin-bottom:8px">حذف المنتج؟</div>
    <div style="color:var(--sub);font-size:.88rem;margin-bottom:20px" id="deleteProductName"></div>
    <div style="display:flex;gap:10px;justify-content:center"><button class="btn btn-ghost" onclick="closeDeleteModal()">إلغاء</button><button class="btn btn-danger" onclick="confirmDelete()" id="confirmDeleteBtn">حذف نهائي</button></div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<button onclick="document.getElementById('settingsCard').style.display = document.getElementById('settingsCard').style.display==='none'?'block':'none'" style="position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:50%;width:44px;height:44px;font-size:1.2rem;cursor:pointer;color:var(--sub)">⚙️</button>
<script>
let BASE_URL = localStorage.getItem('ck_base') || 'http://localhost:8080';
let API_TOKEN = localStorage.getItem('ck_token') || 'ck_9f6e3b42d14a4c4f8ea8a4fb6f6f0e11';
document.getElementById('cfgBase').value = BASE_URL;
document.getElementById('cfgToken').value = API_TOKEN;
function saveSettings() { BASE_URL = document.getElementById('cfgBase').value.replace(/\/$/, '').trim(); API_TOKEN = document.getElementById('cfgToken').value.trim(); localStorage.setItem('ck_base', BASE_URL); localStorage.setItem('ck_token', API_TOKEN); toast('تم حفظ الإعدادات', 'success'); checkHealth(); loadProducts(); }
let allProducts = []; let deleteTargetId = null; let selectedFile = null;
const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_TOKEN}` });
async function api(method, path, body) { const opts = { method, headers: headers() }; if (body) opts.body = JSON.stringify(body); const res = await fetch(BASE_URL + path, opts); return res.json(); }
async function checkHealth() { const dot = document.getElementById('statusDot'); const txt = document.getElementById('statusText'); dot.className = 'dot'; txt.textContent = 'جاري الاتصال...'; try { const d = await fetch(BASE_URL + '/health').then(r => r.json()); if (d.ok) { dot.className = 'dot green'; txt.textContent = 'متصل ✓'; toast('السيرفر متصل', 'success'); } else throw new Error(); } catch { dot.className = 'dot red'; txt.textContent = 'غير متصل ✗'; toast('تعذّر الاتصال بالسيرفر', 'error'); } }
async function loadProducts() { try { const d = await fetch(BASE_URL + '/products?includeHidden=1').then(r => r.json()); allProducts = d.items || []; renderTable(); updateStats(); } catch { toast('فشل تحميل المنتجات', 'error'); document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="empty"><div class="empty-icon">⚠️</div><div>تعذّر تحميل المنتجات</div></td></tr>'; } }
function updateStats() { const visible = allProducts.filter(p => !p.isHidden).length; const hidden = allProducts.filter(p => p.isHidden).length; const cats = new Set(allProducts.map(p => p.category)).size; document.getElementById('statTotal').textContent = allProducts.length; document.getElementById('statVisible').textContent = visible; document.getElementById('statHidden').textContent = hidden; document.getElementById('statCats').textContent = cats; }
function renderTable() { const q = document.getElementById('searchBox').value.trim().toLowerCase(); const showHidden = document.getElementById('showHidden').checked; let list = allProducts.filter(p => { if (!showHidden && p.isHidden) return false; if (!q) return true; return (p.name || '').toLowerCase().includes(q) || (p.category || '').toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q); }); if (!list.length) { document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="empty"><div class="empty-icon">📭</div><div>لا توجد منتجات</div></td></tr>'; return; } document.getElementById('tableBody').innerHTML = list.map(p => ` <tr> <td> ${p.imageUrl ? `<img class="img-thumb" src="${escHtml(p.imageUrl)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''} <div class="img-placeholder" style="${p.imageUrl ? 'display:none' : ''}">👗</div> </td> <td> <div style="font-weight:600">${escHtml(p.name)}</div> ${p.tags ? `<div style="font-size:.72rem;color:var(--sub);margin-top:2px">${escHtml(p.tags)}</div>` : ''} </td> <td> <div style="font-weight:700;color:var(--accent)">${p.price} ل.د</div> ${p.oldPrice ? `<div style="font-size:.75rem;color:var(--sub);text-decoration:line-through">${p.oldPrice}</div>` : ''} </td> <td>${escHtml(p.category || '–')}</td> <td>${p.rating ? `⭐ ${p.rating}` : '–'}</td> <td><span class="badge ${p.isHidden ? 'badge-red' : 'badge-green'}">${p.isHidden ? 'مخفي' : 'ظاهر'}</span></td> <td style="display:flex;gap:4px"> <button class="btn-icon" title="تعديل" onclick='openEditModal(${JSON.stringify(p)})'>✏️</button> <button class="btn-icon" title="حذف" onclick="openDeleteModal('${p.id}','${escHtml(p.name)}')">🗑</button> <button class="btn-icon" title="${p.isHidden ? 'إظهار' : 'إخفاء'}" onclick="toggleHidden('${p.id}',${p.isHidden})">${p.isHidden ? '👁' : '🙈'}</button> </td> </tr> `).join(''); }
function openAddModal() { resetForm(); document.getElementById('modalTitle').textContent = 'منتج جديد'; document.getElementById('productModal').classList.add('open'); }
function openEditModal(p) { resetForm(); document.getElementById('modalTitle').textContent = 'تعديل المنتج'; document.getElementById('editId').value = p.id; document.getElementById('fName').value = p.name || ''; document.getElementById('fPrice').value = p.price || ''; document.getElementById('fOldPrice').value = p.oldPrice || ''; document.getElementById('fCategory').value = p.category || ''; document.getElementById('fTags').value = p.tags || ''; document.getElementById('fSizes').value = p.sizes || ''; document.getElementById('fLengths').value = p.lengths || ''; document.getElementById('fRating').value = p.rating || ''; document.getElementById('fReviews').value = p.reviewsCount || ''; document.getElementById('fDesc').value = p.description || ''; document.getElementById('fImageUrl').value = p.imageUrl || ''; document.getElementById('fHidden').checked = !!p.isHidden; if (p.imageUrl) { const prev = document.getElementById('uploadPreview'); prev.src = p.imageUrl; prev.style.display = 'block'; } document.getElementById('productModal').classList.add('open'); }
function closeModal() { document.getElementById('productModal').classList.remove('open'); resetForm(); }
function resetForm() { ['editId','fName','fPrice','fOldPrice','fCategory','fTags','fSizes','fLengths','fRating','fReviews','fDesc','fImageUrl'].forEach(id => document.getElementById(id).value = ''); document.getElementById('fHidden').checked = false; document.getElementById('uploadPreview').style.display = 'none'; document.getElementById('uploadPreview').src = ''; selectedFile = null; }
async function saveProduct() { const name = document.getElementById('fName').value.trim(); if (!name) { toast('الاسم مطلوب', 'error'); return; } const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; const payload = { name, price: parseFloat(document.getElementById('fPrice').value) || 0, oldPrice: parseFloat(document.getElementById('fOldPrice').value) || 0, category: document.getElementById('fCategory').value.trim() || 'غير مصنف', tags: document.getElementById('fTags').value.trim(), sizes: document.getElementById('fSizes').value.trim(), lengths: document.getElementById('fLengths').value.trim(), rating: parseFloat(document.getElementById('fRating').value) || 0, reviewsCount: parseInt(document.getElementById('fReviews').value) || 0, description: document.getElementById('fDesc').value.trim(), imageUrl: document.getElementById('fImageUrl').value.trim(), imageUrls: document.getElementById('fImageUrl').value.trim() ? [document.getElementById('fImageUrl').value.trim()] : [], isHidden: document.getElementById('fHidden').checked ? 1 : 0, }; try { const id = document.getElementById('editId').value; const d = id ? await api('PUT', `/products/${id}`, payload) : await api('POST', '/products', payload); if (d.ok) { toast(id ? 'تم تحديث المنتج ✓' : 'تم إضافة المنتج ✓', 'success'); closeModal(); loadProducts(); } else { toast(d.error || 'حدث خطأ', 'error'); } } catch { toast('فشل الاتصال بالسيرفر', 'error'); } finally { btn.disabled = false; btn.textContent = 'حفظ المنتج'; } }
function handleDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag'); }
function handleDragLeave() { document.getElementById('dropZone').classList.remove('drag'); }
function handleDrop(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('drag'); const f = e.dataTransfer.files[0]; if (f) setFile(f); }
function handleFileSelect(e) { const f = e.target.files[0]; if (f) setFile(f); }
function setFile(f) { selectedFile = f; const reader = new FileReader(); reader.onload = ev => { const prev = document.getElementById('uploadPreview'); prev.src = ev.target.result; prev.style.display = 'block'; }; reader.readAsDataURL(f); toast(`تم اختيار: ${f.name}`, 'info'); }
async function uploadImage() { if (!selectedFile) { toast('اختر صورة أولاً', 'error'); return; } const btn = document.getElementById('uploadBtn'); btn.disabled = true; btn.textContent = '...'; try { const fd = new FormData(); fd.append('image', selectedFile); const res = await fetch(BASE_URL + '/products/upload', { method: 'POST', headers: { 'Authorization': `Bearer ${API_TOKEN}` }, body: fd }); const d = await res.json(); if (d.ok) { document.getElementById('fImageUrl').value = d.url; toast('تم رفع الصورة ✓', 'success'); } else { toast(d.error || 'فشل رفع الصورة', 'error'); } } catch { toast('فشل الاتصال بالسيرفر', 'error'); } finally { btn.disabled = false; btn.textContent = 'رفع ↑'; } }
function openDeleteModal(id, name) { deleteTargetId = id; document.getElementById('deleteProductName').textContent = name; document.getElementById('deleteModal').classList.add('open'); }
function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); deleteTargetId = null; }
async function confirmDelete() { if (!deleteTargetId) return; const btn = document.getElementById('confirmDeleteBtn'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; try { const d = await api('DELETE', `/products/${deleteTargetId}`); if (d.ok) { toast('تم حذف المنتج', 'success'); closeDeleteModal(); loadProducts(); } else { toast(d.error || 'فشل الحذف', 'error'); } } catch { toast('فشل الاتصال بالسيرفر', 'error'); } finally { btn.disabled = false; btn.textContent = 'حذف نهائي'; } }
async function toggleHidden(id, currentHidden) { try { const d = await api('PUT', `/products/${id}`, { isHidden: currentHidden ? 0 : 1 }); if (d.ok) { toast(currentHidden ? 'تم إظهار المنتج' : 'تم إخفاء المنتج', 'success'); loadProducts(); } else toast(d.error || 'فشل التحديث', 'error'); } catch { toast('فشل الاتصال', 'error'); } }
function toast(msg, type = 'info') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t); setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 3000); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
checkHealth(); loadProducts();
</script>
